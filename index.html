<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angela | Portafolio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- Fondo -->
    <div class="background"></div>

    <!-- Logo Angela -->
    <a href="PaginaInformacion.html">
        <img src="Img/Angela(400px).png" alt="Angela" class="logo-angela">
    </a>

    <section class="carousel-container">
        <img src="Img/Arrow_Back.png" class="arrow left" id="prevBtn">
        
        <div class="carousel-stage">
            <div class="side-card" id="prevCard">
                <img id="prevImage" src="">
            </div>

            <div class="image-card">
                <div class="spinner" id="spinner"></div>
                <img id="carouselImage" src="">
            </div>

            <div class="side-card" id="nextCard">
                <img id="nextImage" src="">
            </div>
        </div>

        <img src="Img/Arrow_Next.png" class="arrow right" id="nextBtn">

    </section>

    <!-- Título -->
    <div class="category-title">

        <!-- Imagen marco -->
        <img src="Img/Marco.png" alt="" class="title-frame">

        <!-- Texto -->
        <p id="categoryText">Audiovisuales</p>

    </div>

    <script src="script.js"></script>

</body>
</html>
